<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Not Found</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #08060d;
        color: #e0e0e0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 2rem;
      }
      .container {
        text-align: center;
        max-width: 500px;
      }
      h1 {
        font-size: 5rem;
        color: #1fc7b9;
        margin-bottom: 0.5rem;
      }
      p {
        font-size: 1.25rem;
        margin-bottom: 2rem;
        opacity: 0.8;
      }
      a {
        display: inline-block;
        padding: 0.75rem 1.5rem;
        background: #1fc7b9;
        color: #08060d;
        border-radius: 0.5rem;
        text-decoration: none;
        font-weight: 600;
        transition: opacity 0.2s;
        cursor: pointer;
      }
      a:hover {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>404</h1>
      <p>This resource doesn't exist.</p>
      <a href="/">Return to Home</a>
    </div>
  </body>
</html>
